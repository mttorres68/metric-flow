# ─────────────────────────────────────────────────────────────────────────────
# Evolution API v2 — Docker Compose (uso local / Windows)
# ─────────────────────────────────────────────────────────────────────────────
# Sobe 3 serviços (frontends oficiais estão quebrados — gerenciar via API):
#   • evolution_api      → API principal    → http://localhost:8080
#   • evolution_postgres → banco de dados   → porta 5432 (interna)
#   • evolution_redis    → cache/filas      → porta 6379 (interna)
#
# Criar instância: veja COMO_INSTALAR.md → seção "Configuração inicial"
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Evolution API ────────────────────────────────────────────────────────────
  evolution_api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution_postgres
      - evolution_redis
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    env_file:
      - .env
    networks:
      - evolution-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  evolution_postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution-net
    ports:
      - "5432:5432"

  # ── Redis ────────────────────────────────────────────────────────────────────
  evolution_redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    # Descomente para acessar o Redis diretamente
    # ports:
    #   - "6379:6379"

# ─── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

# ─── Rede interna ─────────────────────────────────────────────────────────────
networks:
  evolution-net:
    name: evolution-net
    driver: bridge
